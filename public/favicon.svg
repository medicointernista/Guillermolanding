<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#ffffff"/>

  <!-- Outer circle with gradient effect -->
  <defs>
    <linearGradient id="handGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="personGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0052A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F47;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left hand -->
  <path d="M 50 100 Q 40 80 35 100 Q 40 120 50 100 Z" fill="url(#handGradient)" opacity="0.9"/>

  <!-- Right hand -->
  <path d="M 150 100 Q 160 80 165 100 Q 160 120 150 100 Z" fill="url(#handGradient)" opacity="0.9"/>

  <!-- Head -->
  <circle cx="100" cy="70" r="18" fill="url(#personGradient)"/>

  <!-- Body -->
  <ellipse cx="100" cy="110" rx="22" ry="28" fill="url(#personGradient)"/>

  <!-- Stylized leaf/care element behind -->
  <path d="M 100 30 Q 110 50 100 70 Q 90 50 100 30 Z" fill="url(#handGradient)" opacity="0.6"/>

  <!-- Border circle -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#003D6B" stroke-width="2" opacity="0.3"/>
</svg>